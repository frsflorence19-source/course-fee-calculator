<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Growth Valley 课程金额计算器</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="topbar">
  <div class="brand"><img src="crest.svg" alt="" /> GROWTH VALLEY <span style="color:var(--muted);font-weight:400;font-size:13px;margin-left:4px;">课程金额计算器</span></div>
  <div class="who">
    <span id="whoami"></span>
    <button class="btn-secondary small-btn" id="pwBtn">修改密码</button>
    <button class="btn-secondary small-btn" id="logoutBtn">退出登录</button>
  </div>
</div>

<div class="container">

  <!-- 计算器 -->
  <div class="card">
    <h2>计算课程金额</h2>
    <div class="grid-2">
      <div>
        <label>Main Amount（基础课程金额）</label>
        <input id="mainAmount" type="number" min="0" step="0.01" placeholder="例如 1500" />
      </div>
      <div>
        <label>货币</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="SGD">SGD</option>
          <option value="MYR">MYR</option>
        </select>
      </div>
    </div>

    <!-- USD / SGD 分期数输入 -->
    <div id="installmentField">
      <label id="installmentLabel">分期数</label>
      <input id="installments" type="number" min="1" max="9" step="1" placeholder="1-9" />
      <div class="hint" id="installmentHint">USD：1-3 期加 USD 50，4-7 期加 USD 60，8-9 期加 USD 80（整单只加一次）</div>
    </div>

    <!-- MYR 汇率输入 -->
    <div id="rateField" class="hidden">
      <label>汇率 Rate（USD → MYR，请自行填写当前汇率）</label>
      <input id="rate" type="number" min="0" step="0.0001" placeholder="例如 4.70" />
      <div class="hint">MYR 总额 = Main Amount × Rate，无额外手续费，自动显示 12 / 24 / 36 期每期金额</div>
    </div>

    <div class="error" id="calcErr"></div>

    <div class="field-row">
      <div><button class="btn-primary" id="calcBtn" type="button">计算</button></div>
      <div><button class="btn-secondary" id="saveBtn" type="button" disabled>保存记录</button></div>
    </div>

    <div class="hint" style="margin-top:10px;">
      <label style="display:inline;font-weight:400;">备注（可选）</label>
      <input id="note" placeholder="例如学生姓名 / 课程名称" style="margin-top:6px;" />
    </div>

    <div id="resultBox" class="result-box hidden"></div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div class="flex-between">
      <h2>历史记录</h2>
      <div id="adminFilterWrap" class="hidden">
        <label style="display:inline;margin-right:8px;">
          <input type="checkbox" id="showAll" style="width:auto;margin:0;" /> 查看所有老师的记录（管理员）
        </label>
      </div>
    </div>
    <div id="recordsWrap">加载中…</div>
  </div>

  <!-- 管理员：账号管理 -->
  <div class="card hidden" id="adminCard">
    <h2>教师账号管理</h2>
    <div class="grid-2">
      <div>
        <label>用户名</label>
        <input id="newUsername" placeholder="例如 teacher_amy" />
      </div>
      <div>
        <label>密码</label>
        <input id="newPassword" placeholder="初始密码，登录后可自行修改" />
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-weight:400;">
      <input type="checkbox" id="newIsAdmin" style="width:auto;margin:0;" /> 设为管理员
    </label>
    <div class="error" id="userErr"></div>
    <button class="btn-primary" id="addUserBtn" type="button" style="width:auto;">新增账号</button>

    <h3>已有账号</h3>
    <div id="usersWrap">加载中…</div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
